# Build from local source instead of pulling from Docker Hub.
# Requires sibling repos ../orca, ../themis, and ../gridfinity-customizer to be present.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.local.yml up

services:
  orca:
    build: ../orca

  themis:
    build: ../themis

  ordinus:
    build:
      context: ../gridfinity-customizer
      dockerfile: infra/Dockerfile
