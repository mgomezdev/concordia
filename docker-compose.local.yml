# Build from local source instead of pulling from Docker Hub.
# Requires sibling repos ../orca (laminus), ../themis, and ../ordinus to be present.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.local.yml up

services:
  laminus:
    build: ../orca
    volumes:
      - ../orca/config:/config
      - ../orca/data:/data

  themis:
    build: ../themis

  ordinus:
    build:
      context: ../ordinus
      dockerfile: infra/Dockerfile
